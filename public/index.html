<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CodeACT Loop (Phase 1)</title>
  <style>
    body { font-family: -apple-system, system-ui; margin: 0; padding: 20px; background: #111; color: #fff; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    h2 { margin-top: 0; color: #ccc; }
    textarea { width: 100%; height: 60px; padding: 10px; font-size: 14px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; resize: none; outline: none; box-sizing: border-box; }
    textarea:focus { border-color: #007acc; }
    button { padding: 10px 20px; margin-top: 10px; background: #007acc; color: white; border: none; border-radius: 4px; cursor: pointer; align-self: flex-start; font-weight: bold; }
    button:hover { background: #0098ff; }
    button:disabled { background: #444; cursor: not-allowed; }
    .panes { display: flex; flex: 1; margin-top: 20px; gap: 20px; flex-direction: row; overflow: hidden; }
    .pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .pane-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
    pre { flex: 1; background: #1a1a1a; padding: 15px; border-radius: 4px; border: 1px solid #333; margin: 0; white-space: pre-wrap; word-wrap: break-word; font-family: Consolas, monospace; font-size: 13px; color: #00ff00; overflow-y: auto;}
    #scriptOutput { color: #569cd6; } /* generic code blue text */
    #status { margin-left: 15px; color: #888; align-self: center; font-size: 14px; }
    .action-row { display: flex; }
  </style>
</head>
<body>
  <h2>CodeACT Agent Kernel (Phase 1 Proof)</h2>
  <textarea id="queryInput" placeholder="Enter query (e.g., 'Find variables mutated in x')..."></textarea>
  <div class="action-row">
    <button id="runBtn">Run CodeACT Loop</button>
    <span id="status"></span>
  </div>
  
  <div class="panes">
    <div class="pane">
      <div class="pane-title">Generated PoT Script (LLM Thought)</div>
      <pre id="scriptOutput">Waiting for input...</pre>
    </div>
    <div class="pane">
      <div class="pane-title">Execution Result (Sandbox Env)</div>
      <pre id="resultOutput">Waiting for script execution...</pre>
    </div>
  </div>

  <script type="module" src="../dist/renderer.js"></script>
</body>
</html>
